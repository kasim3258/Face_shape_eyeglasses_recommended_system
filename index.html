<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLASSES AI | Perfect Frame Finder</title>
   
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #0b0b1a;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, #1a1a3a 0%, #0b0b1a 50%);
            z-index: -2;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -200px;
            background: radial-gradient(circle at 30% 30%, rgba(147, 51, 234, 0.2), transparent);
            animation-delay: -2s;
        }

        .shape-2 {
            width: 600px;
            height: 600px;
            bottom: -300px;
            left: -200px;
            background: radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.15), transparent);
            animation-delay: -5s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            top: 40%;
            left: 30%;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15), transparent);
            animation-delay: -8s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(3%, 3%) rotate(120deg) scale(1.1); }
            66% { transform: translate(-3%, 2%) rotate(240deg) scale(0.9); }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            animation: slideDown 1s ease-out;
        }

        .header h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #c084fc 50%, #f9a8d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c084fc, #f9a8d4, transparent);
            animation: widthPulse 3s infinite;
        }

        @keyframes widthPulse {
            0%, 100% { width: 200px; opacity: 0.5; }
            50% { width: 300px; opacity: 1; }
        }

        .header p {
            color: #a0a0c0;
            font-size: 1.3rem;
            font-weight: 300;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            flex: 1;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Glass Card */
        .glass-card {
            background: rgba(20, 20, 35, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardRise 1s ease-out;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(192, 132, 252, 0.3);
        }

        @keyframes cardRise {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload Area */
        .upload-area {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(192, 132, 252, 0.3);
            border-radius: 30px;
            padding: 60px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #c084fc;
            background: rgba(192, 132, 252, 0.05);
            transform: scale(1.02);
        }

        .upload-area i {
            font-size: 4rem;
            background: linear-gradient(135deg, #c084fc, #f9a8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .upload-area h3 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .upload-area p {
            color: #a0a0c0;
        }

        /* Preview Container */
        .preview-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .preview-container.active {
            display: block;
            animation: fadeScale 0.5s ease;
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #imagePreview {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }

        /* Face Points Overlay */
        .face-points {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #c084fc;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #c084fc;
            animation: pulsePoint 1.5s infinite;
        }

        .point::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 2px solid rgba(192, 132, 252, 0.3);
            border-radius: 50%;
            animation: ringPulse 1.5s infinite;
        }

        @keyframes pulsePoint {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.5); }
        }

        @keyframes ringPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Analyze Button */
        .analyze-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #9333ea, #db2777);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .analyze-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .analyze-btn:hover:not(:disabled)::after {
            opacity: 1;
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px #9333ea;
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Shape Selector */
        .shape-selector {
            margin: 20px 0;
            text-align: center;
        }

        .shape-selector h4 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .shape-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .shape-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(192, 132, 252, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shape-btn i {
            color: #c084fc;
        }

        .shape-btn:hover {
            background: rgba(192, 132, 252, 0.2);
            transform: translateY(-3px);
            border-color: #c084fc;
        }

        .shape-btn.active {
            background: linear-gradient(135deg, #9333ea, #db2777);
            border-color: transparent;
        }

        .shape-btn.active i {
            color: white;
        }

        /* Result Card */
        .result-card {
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(192, 132, 252, 0.2);
            text-align: center;
        }

        .shape-icon-large {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #9333ea, #db2777);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(147, 51, 234, 0.5); }
            50% { box-shadow: 0 0 60px rgba(219, 39, 119, 0.8); }
        }

        .shape-icon-large i {
            font-size: 4rem;
            color: white;
        }

        #detectedShapeDisplay {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .face-details {
            color: #a0a0c0;
            font-size: 1.1rem;
        }

        .face-details span {
            color: #c084fc;
            font-weight: 600;
        }

        /* Glasses Grid */
        .glasses-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .frame-card {
            background: rgba(255,255,255,0.02);
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .frame-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(192,132,252,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .frame-card:hover::before {
            opacity: 1;
        }

        .frame-card:hover {
            transform: translateY(-10px);
            border-color: #c084fc;
            box-shadow: 0 20px 40px -15px #9333ea;
        }

        .frame-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #c084fc, #f9a8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .frame-card h3 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .frame-card p {
            color: #a0a0c0;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .frame-tag {
            background: rgba(192, 132, 252, 0.2);
            color: #c084fc;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Hidden */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>GLASSES AI</h1>
            <p>Discover your perfect frames with AI-powered face analysis</p>
        </div>

        <div class="main-grid">
            <!-- Left Panel - Upload & Select -->
            <div class="glass-card">
                <h2 style="color: white; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-camera" style="color: #c084fc;"></i>
                    1. Upload or Select Face Shape
                </h2>

                <!-- Upload Area -->
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Drop your photo here</h3>
                    <p>or click to browse (JPG, PNG)</p>
                </div>

                <input type="file" id="fileInput" accept="image/*">

                <!-- Preview Container -->
                <div class="preview-container" id="previewContainer">
                    <img id="imagePreview" src="" alt="Preview">
                    <div class="face-points" id="facePoints"></div>
                </div>

                <!-- Manual Shape Selector -->
                <div class="shape-selector">
                    <h4><i class="fas fa-arrow-down" style="color: #c084fc;"></i> Or choose your face shape manually:</h4>
                    <div class="shape-buttons" id="shapeButtons">
                        <div class="shape-btn" data-shape="oval">
                            <i class="fas fa-circle"></i> Oval
                        </div>
                        <div class="shape-btn" data-shape="round">
                            <i class="fas fa-circle"></i> Round
                        </div>
                        <div class="shape-btn" data-shape="square">
                            <i class="fas fa-square"></i> Square
                        </div>
                        <div class="shape-btn" data-shape="heart">
                            <i class="fas fa-heart"></i> Heart
                        </div>
                        <div class="shape-btn" data-shape="oblong">
                            <i class="fas fa-rectangle-wide"></i> Oblong
                        </div>
                    </div>
                </div>

                <!-- Analyze Button -->
                <button class="analyze-btn" id="analyzeBtn">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    ANALYZE & FIND MATCHES
                </button>
            </div>

            <!-- Right Panel - Results -->
            <div class="glass-card">
                <h2 style="color: white; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-diamond" style="color: #f9a8d4;"></i>
                    2. Your Perfect Matches
                </h2>

                <!-- Face Shape Result -->
 <div class="result-card">
    <div class="shape-icon-large">
        <i class="fas fa-face-smile" id="resultIcon"></i>
    </div>
    <div id="detectedShapeDisplay">Select a shape</div>
    <div class="face-details" id="faceDetails"></div>

    <img id="resultImage" 
      style="width:100%; max-width:350px; margin-top:20px; border-radius:15px; display:none;" />
</div>

                <!-- Glasses Recommendations -->
                <h3 style="color: white; margin-bottom: 20px;">Recommended Frames</h3>
                <div class="glasses-grid" id="glassesGrid">
                    <!-- Will be populated dynamically -->
                </div>
            </div>
        </div>
    </div>

   <script>
// Glasses Database
const glassesDB = {
    oval: [
        { name: "Geometric Edge", description: "Angular frames that complement oval softness", icon: "fa-diamond", tag: "MODERN" },
        { name: "Classic Aviator", description: "Timeless metal frame, perfect balance", icon: "fa-glasses", tag: "ICONIC" },
        { name: "Square Acetate", description: "Structured look with premium materials", icon: "fa-square", tag: "SOPHISTICATED" },
        { name: "Cat-Eye Luxe", description: "Elegant lift with handcrafted details", icon: "fa-eye", tag: "TRENDING" }
    ],
    round: [
        { name: "Rectangular Frame", description: "Sharp angles define and elongate", icon: "fa-grip-lines", tag: "ARCHITECTURAL" },
        { name: "Browline Classic", description: "Vintage inspired, modern comfort", icon: "fa-glasses", tag: "RETRO" },
        { name: "Geometric Square", description: "Bold shapes for soft features", icon: "fa-border-all", tag: "BOLD" },
        { name: "Navigator Style", description: "Angular pilot frames", icon: "fa-glasses", tag: "CLASSIC" }
    ],
    square: [
        { name: "Round Frames", description: "Soft circles balance strong jaw", icon: "fa-circle", tag: "BALANCED" },
        { name: "Oversized Oval", description: "Flowing silhouette, modern look", icon: "fa-glasses", tag: "STATEMENT" },
        { name: "Butterfly Wing", description: "Romantic shape softens angles", icon: "fa-butterfly", tag: "ELEGANT" },
        { name: "Rimless Style", description: "Almost invisible, pure sophistication", icon: "fa-border-none", tag: "MINIMAL" }
    ],
    heart: [
        { name: "Bottom Heavy", description: "Balances wider forehead", icon: "fa-glasses", tag: "HARMONY" },
        { name: "Rimless Light", description: "Featherlight, distraction-free", icon: "fa-feather", tag: "LIGHT" },
        { name: "Butterfly Glam", description: "Flattering cat-eye style", icon: "fa-butterfly", tag: "GLAMOROUS" },
        { name: "Oval Classic", description: "Softens features perfectly", icon: "fa-circle", tag: "TIMELESS" }
    ],
    oblong: [
        { name: "Oversized Square", description: "Adds width, shortens length", icon: "fa-border-all", tag: "BOLD" },
        { name: "Temple Detail", description: "Decorative sides draw attention", icon: "fa-glasses", tag: "DETAILED" },
        { name: "Clubmaster", description: "Hybrid style with character", icon: "fa-glasses", tag: "DISTINCTIVE" },
        { name: "Wayfarer", description: "Classic width-enhancing design", icon: "fa-glasses", tag: "HERITAGE" }
    ]
};

// DOM Elements
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const imagePreview = document.getElementById('imagePreview');
const analyzeBtn = document.getElementById('analyzeBtn');
const shapeButtons = document.querySelectorAll('.shape-btn');
const detectedShapeDisplay = document.getElementById('detectedShapeDisplay');
const faceDetails = document.getElementById('faceDetails');
const resultIcon = document.getElementById('resultIcon');
const glassesGrid = document.getElementById('glassesGrid');
const resultImage = document.getElementById('resultImage');

let currentShape = 'oval';

// Upload handlers
uploadArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            imagePreview.src = ev.target.result;
            previewContainer.classList.add('active');
        };
        reader.readAsDataURL(e.target.files[0]);
    }
});

// Shape buttons
shapeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        shapeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        currentShape = btn.dataset.shape;

        detectedShapeDisplay.textContent = currentShape.charAt(0).toUpperCase() + currentShape.slice(1);
        faceDetails.innerHTML = '<span>✓</span> Manual selection';

        showRecommendations(currentShape);
    });
});

// Show recommendations
function showRecommendations(shape) {
    glassesGrid.innerHTML = "";

    (glassesDB[shape] || []).forEach(g => {
        glassesGrid.innerHTML += `
        <div class="frame-card">
            <div class="frame-icon"><i class="fas ${g.icon}"></i></div>
            <h3>${g.name}</h3>
            <p>${g.description}</p>
            <div class="frame-tag">${g.tag}</div>
        </div>`;
    });
}

// 🔥 MAIN ANALYZE BUTTON
analyzeBtn.addEventListener('click', async () => {

    analyzeBtn.innerHTML = "Analyzing...";
    analyzeBtn.disabled = true;

    resultImage.style.display = "none";

    if (!fileInput.files.length) {
        alert("Upload image first!");

        // reset button immediately
        analyzeBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> ANALYZE & FIND MATCHES';
        analyzeBtn.disabled = false;
        return;
    }

    const formData = new FormData();
    formData.append("image", fileInput.files[0]);

    try {
        const res = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        // show image
        if (data.image) {
            resultImage.src = "data:image/jpeg;base64," + data.image;
            resultImage.style.display = "block";
        }

        let shape = data.face_shape;

        // 🔴 uncertain case
        if (shape === "Uncertain") {
            detectedShapeDisplay.textContent = "Try Again";
            faceDetails.innerHTML = "<span>Low confidence</span>";
            glassesGrid.innerHTML = "<p>No recommendation</p>";
            return;
        }

        shape = shape.toLowerCase();

        detectedShapeDisplay.textContent = data.face_shape;

        faceDetails.innerHTML = `
            <span>Confidence: ${data.confidence}%</span><br>
            ${data.recommended_frame}
        `;

        showRecommendations(shape);

    } catch (err) {
        console.error(err);
        alert("Backend error");
    } finally {

        // ✅ ALWAYS RESET BUTTON
        analyzeBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> ANALYZE & FIND MATCHES';
        analyzeBtn.disabled = false;

        analyzeBtn.style.transform = 'scale(0.95)';
        setTimeout(() => analyzeBtn.style.transform = '', 200);
    }
});

// init
shapeButtons[0].classList.add('active');
showRecommendations('oval');
detectedShapeDisplay.textContent = 'Oval';
faceDetails.innerHTML = 'Upload image or choose manually';
</script>
</body>
</html>
